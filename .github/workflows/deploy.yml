name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  validate-backend:
    name: Validate backend (Laravel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, intl, pdo, pdo_pgsql, sqlite, bcmath
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run tests
        env:
          APP_KEY: base64:u64YBy7SnoGf5+6y/SIs8B3v7E6S9i6G7fW8u9IuE4c=
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: composer test

  validate-frontend:
    name: Validate frontend (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_GASOLINERAS_URL: ${{ secrets.VITE_GASOLINERAS_URL }}

  deploy-backend-ec2:
    name: Deploy backend to EC2
    runs-on: ubuntu-latest
    needs:
      - validate-backend
      - validate-frontend
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_PORT: ${{ secrets.EC2_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Trust EC2 host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${EC2_PORT:-22}" "${EC2_HOST}" >> ~/.ssh/known_hosts

      - name: Define release path
        id: release
        run: |
          RELEASE_ID="$(date +'%Y%m%d%H%M%S')"
          RELEASE_PATH="${DEPLOY_PATH:-/var/www/gaslighting}/releases/${RELEASE_ID}"
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"
          echo "release_path=${RELEASE_PATH}" >> "$GITHUB_OUTPUT"

      - name: Create release directories
        run: |
          ssh -p "${EC2_PORT:-22}" "${EC2_USER}@${EC2_HOST}" "
            set -e
            BASE='${DEPLOY_PATH:-/var/www/gaslighting}'
            mkdir -p \"\$BASE/releases\"
            mkdir -p \"\$BASE/shared/storage/framework/cache\" \"\$BASE/shared/storage/framework/sessions\" \"\$BASE/shared/storage/framework/views\"
            mkdir -p \"\$BASE/shared/storage/logs\" \"\$BASE/shared/bootstrap-cache\"
          "

      - name: Upload backend source
        run: |
          rsync -az --delete \
            --exclude='.env' \
            --exclude='vendor' \
            --exclude='node_modules' \
            --exclude='storage/*.key' \
            --exclude='tests' \
            --exclude='.git' \
            -e "ssh -p ${EC2_PORT:-22}" \
            backend/ "${EC2_USER}@${EC2_HOST}:${{ steps.release.outputs.release_path }}/"

      - name: Install and switch release
        run: |
          ssh -p "${EC2_PORT:-22}" "${EC2_USER}@${EC2_HOST}" "
            set -e

            BASE='${DEPLOY_PATH:-/var/www/gaslighting}'
            RELEASE='${{ steps.release.outputs.release_path }}'
            CURRENT=\"$BASE/current\"
            PREVIOUS=\"$(readlink -f \"$CURRENT\" || true)\"

            if [ ! -f \"$BASE/shared/.env\" ]; then
              echo 'Missing shared environment file at $BASE/shared/.env'
              exit 1
            fi

            cd \"$RELEASE\"
            ln -sfn \"$BASE/shared/.env\" .env
            rm -rf storage
            ln -sfn \"$BASE/shared/storage\" storage
            rm -rf bootstrap/cache
            ln -sfn \"$BASE/shared/bootstrap-cache\" bootstrap/cache

            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

            php artisan migrate --force
            php artisan optimize
            php artisan queue:restart || true

            ln -sfn \"$RELEASE\" \"$CURRENT\"

            if [ -n \"${BACKEND_HEALTHCHECK_URL}\" ]; then
              if ! curl -fsS \"${BACKEND_HEALTHCHECK_URL}\" > /dev/null; then
                echo 'Healthcheck failed, rolling back symlink'
                if [ -n \"$PREVIOUS\" ]; then
                  ln -sfn \"$PREVIOUS\" \"$CURRENT\"
                fi
                exit 1
              fi
            fi

            sudo systemctl reload php8.4-fpm || sudo systemctl reload php8.2-fpm || sudo systemctl reload php-fpm || true
            sudo systemctl reload nginx || true
          "

      - name: Deploy summary
        run: |
          echo "Backend deployed to release: ${{ steps.release.outputs.release_path }}"
          echo "Frontend deploy runs in AWS Amplify (Git-connected)."
