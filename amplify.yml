version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
            - echo "VITE_APP_URL_BASE=$VITE_APP_URL_BASE" > .env
            - echo "VITE_GASOLINERAS_URL=$VITE_GASOLINERAS_URL" >> .env
            - echo "--- .env content ---" && cat .env
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
